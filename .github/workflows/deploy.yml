name: Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 打包前端构建产物
      - name: Package frontend
        run: |
          cd dist
          tar czf ../deploy-dist.tar.gz *
          cd ..
          ls -lh deploy-dist.tar.gz

      # 打包 pb_hooks
      - name: Package hooks
        run: |
          cd pb_hooks
          tar czf ../deploy-hooks.tar.gz *.pb.js
          cd ..
          ls -lh deploy-hooks.tar.gz

      # 上传前端到服务器 /tmp/
      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'deploy-dist.tar.gz'
          target: '/tmp/'

      # 上传 hooks 到服务器 /tmp/
      - name: Deploy hooks to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'deploy-hooks.tar.gz'
          target: '/tmp/'

      # 执行部署脚本
      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            /opt/pocketbase/scripts/deploy-ci.sh
